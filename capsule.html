<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Arkive — Capsule</title>
  <link rel="stylesheet" href="./assets/tokens.css">
  <style>
    .detail-main { max-width: 760px; }
    .back-link {
      font-size: 14px;
      color: var(--ink-soft);
    }
    .back-link:hover { color: var(--ink); }

    .detail-hero {
      position: relative;
      border-radius: var(--radius-card);
      overflow: hidden;
      background: rgba(20, 17, 14, 0.05);
      border: 1px solid var(--border-soft);
      aspect-ratio: 16 / 9;
      margin-top: 22px;
    }
    .detail-hero img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .detail-hero .capsule-monogram {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 64px; color: var(--bronze); opacity: 0.5;
    }
    .detail-hero .status-pill {
      position: absolute; top: 14px; right: 14px;
      font-size: 12px; letter-spacing: 0.08em;
      padding: 4px 12px; border-radius: 999px;
      background: rgba(255, 255, 255, 0.78); color: var(--ink);
      border: 1px solid var(--border-soft);
    }

    .detail-head { margin-top: 26px; }
    .detail-title { font-size: 32px; }
    .detail-person { font-size: 16px; color: var(--ink-soft); margin-top: 6px; }
    .detail-statusline { font-size: 15px; color: var(--ink); margin-top: 14px; }
    .detail-subline { font-size: 14px; color: var(--ink-mute); margin-top: 3px; }

    .music-card {
      display: flex; align-items: center; gap: 16px;
      padding: 14px 18px; margin-top: 22px;
    }
    .music-art {
      width: 56px; height: 56px; border-radius: 10px;
      object-fit: cover; background: rgba(20, 17, 14, 0.06);
    }
    .music-title { font-size: 15px; color: var(--ink); }
    .music-artist { font-size: 13.5px; color: var(--ink-mute); margin-top: 2px; }

    .items-block { margin-top: 40px; display: flex; flex-direction: column; gap: 26px; }

    .item-figure { margin: 0; }
    .item-media-frame {
      border-radius: 14px; overflow: hidden;
      border: 1px solid var(--border-soft);
      background: rgba(20, 17, 14, 0.05);
    }
    .item-media-frame img, .item-media-frame video {
      width: 100%; display: block; max-height: 78vh; object-fit: contain;
      background: rgba(20, 17, 14, 0.04);
    }
    .item-caption-line { font-size: 15px; color: var(--ink); margin-top: 10px; }
    .item-side-thought { font-size: 14px; color: var(--ink-soft); font-style: italic; margin-top: 4px; }
    .item-date { font-size: 12.5px; color: var(--ink-mute); margin-top: 4px; }

    .letter-card {
      background: #FFFAF0; /* letter paper surface (shipped-app letter treatment) */
      border: 1px solid var(--border-soft);
      border-radius: var(--radius-card);
      padding: 34px 38px;
    }
    .letter-card .micro-label { display: block; margin-bottom: 14px; }
    .letter-title { font-size: 20px; margin-bottom: 14px; }
    .letter-body {
      font-size: 16.5px; line-height: 1.85; color: var(--ink);
      white-space: pre-wrap; overflow-wrap: break-word;
    }

    .plain-card { padding: 22px 26px; }
    .audio-card audio { width: 100%; margin-top: 12px; }
    .placeholder-card { text-align: center; padding: 34px 26px; }
    .placeholder-card .empty-title { font-size: 17px; color: var(--ink-soft); }

    .contributors-block { margin-top: 44px; }
    .contributor-row {
      display: flex; justify-content: space-between; align-items: baseline;
      padding: 12px 2px; border-bottom: 1px solid var(--border-soft);
      font-size: 15px;
    }
    .contributor-status { font-size: 12.5px; color: var(--ink-mute); letter-spacing: 0.06em; }

    .state-block { margin-top: 60px; }
  </style>
</head>
<body hidden>
  <header class="shell-header">
    <a class="wordmark" href="./capsules.html">Arkive</a>
    <nav class="shell-nav" aria-label="Primary">
      <a href="./capsules.html" aria-current="page">Capsules</a>
      <a href="./people.html">People</a>
      <a href="./settings.html">Settings</a>
    </nav>
    <div class="shell-account">
      <span data-account-name></span>
      <button class="btn btn-quiet" data-sign-out type="button">Sign Out</button>
    </div>
  </header>

  <main class="shell-main detail-main">
    <a class="back-link" href="./capsules.html">← Capsules</a>

    <div class="empty-state state-block" id="detail-loading">
      <p class="empty-title">Opening the capsule record…</p>
    </div>

    <div class="empty-state state-block" id="detail-missing" hidden>
      <p class="empty-title">This capsule isn’t available.</p>
      <p class="empty-hint">It may have been removed, or it belongs to another account.</p>
    </div>

    <article id="detail" hidden>
      <div class="detail-hero" id="hero">
        <div class="capsule-monogram" id="hero-monogram"></div>
        <span class="status-pill" id="hero-pill"></span>
      </div>

      <div class="detail-head">
        <h1 class="detail-title" id="title"></h1>
        <p class="detail-person" id="person" hidden></p>
        <p class="detail-statusline" id="statusline"></p>
        <p class="detail-subline" id="subline" hidden></p>
        <p class="detail-subline" id="sealedline" hidden></p>
      </div>

      <div class="card music-card" id="music" hidden>
        <img class="music-art" id="music-art" alt="" hidden>
        <div>
          <span class="micro-label">Music</span>
          <p class="music-title" id="music-title"></p>
          <p class="music-artist" id="music-artist"></p>
        </div>
      </div>

      <div class="items-block" id="items"></div>

      <div class="contributors-block" id="contributors" hidden>
        <span class="micro-label">Contributors</span>
        <div id="contributor-rows"></div>
      </div>
    </article>
  </main>

  <script type="module">
    import {
      bootSession, wireShell, fetchCapsuleById, capsuleCoverUrl,
      ArkiveItemsCodec, ArkiveStorageHelpers, itemPhotoUrl, itemDisplayTitle,
      capsulePrimaryDateLine, capsuleRoutingLine, fmtMedium,
      supabase, STATUS, DIRECTION, MAILBOX, ITEM_KIND, CONTRIBUTOR_STATUS, BUCKET,
    } from "./assets/arkive.js";

    const boot = await bootSession();
    wireShell(boot);

    const params = new URLSearchParams(window.location.search);
    const capsuleId = params.get("id");
    const loadingEl = document.getElementById("detail-loading");
    const missingEl = document.getElementById("detail-missing");

    let row = null;
    try {
      row = capsuleId ? await fetchCapsuleById(capsuleId) : null;
    } catch (err) {
      console.error("arkive: capsule fetch failed", err);
    }
    loadingEl.hidden = true;

    if (!row) {
      missingEl.hidden = false;
    } else {
      const isReceived = row.direction === DIRECTION.received || row.mailbox === MAILBOX.received;
      if (isReceived && row.status !== STATUS.opened) {
        // The ceremony is the reveal — a direct URL must not bypass it.
        window.location.replace(`./open.html?id=${encodeURIComponent(row.id)}`);
      } else {
        render(row);
      }
    }

    function render(row) {
      document.getElementById("detail").hidden = false;
      document.title = `Arkive — ${row.title || "Capsule"}`;

      // hero
      const hero = document.getElementById("hero");
      const monogram = document.getElementById("hero-monogram");
      monogram.textContent = (row.title || "A").trim().charAt(0).toUpperCase();
      document.getElementById("hero-pill").textContent = row.status ?? "";
      capsuleCoverUrl(row).then((url) => {
        if (!url) return;
        const img = document.createElement("img");
        img.alt = "";
        img.src = url;
        hero.insertBefore(img, monogram);
        monogram.remove();
      });

      // head
      document.getElementById("title").textContent = row.title || "Untitled capsule";
      const personEl = document.getElementById("person");
      const isReceived = row.direction === DIRECTION.received || row.mailbox === MAILBOX.received;
      const person = isReceived
        ? (row.sender_display_name_snapshot ? `From ${row.sender_display_name_snapshot}` : "")
        : personLine(row);
      if (person) { personEl.textContent = person; personEl.hidden = false; }
      document.getElementById("statusline").textContent = capsulePrimaryDateLine(row);
      const subline = capsuleRoutingLine(row);
      if (subline) {
        const el = document.getElementById("subline");
        el.textContent = subline;
        el.hidden = false;
      }
      if (row.sealed_at) {
        const el = document.getElementById("sealedline");
        el.textContent = `Sealed ${fmtMedium(row.sealed_at)}`;
        el.hidden = false;
      }

      // music attribution (display-only, Decision #237)
      if (row.music_song_title) {
        document.getElementById("music").hidden = false;
        document.getElementById("music-title").textContent = row.music_song_title;
        document.getElementById("music-artist").textContent = row.music_artist_name ?? "";
        if (row.music_artwork_url && /^https?:\/\//.test(row.music_artwork_url)) {
          // some rows carry musickit:// library URLs — device-only, skip them
          const art = document.getElementById("music-art");
          art.addEventListener("error", () => { art.hidden = true; }, { once: true });
          art.src = row.music_artwork_url;
          art.hidden = false;
        }
      }

      renderItems(ArkiveItemsCodec.decode(row.items_json));
      loadContributors(row);
    }

    function personLine(row) {
      const name = row.recipient_name || row.recipient_name_snapshot;
      if (!name) return "";
      const relationship = row.recipient_relationship_snapshot;
      return relationship ? `For ${name} · ${relationship}` : `For ${name}`;
    }

    function renderItems(items) {
      const block = document.getElementById("items");
      for (const item of items) {
        switch (item.kind) {
          case ITEM_KIND.photo: block.appendChild(photoItem(item)); break;
          case ITEM_KIND.video: block.appendChild(videoItem(item)); break;
          case ITEM_KIND.audio: block.appendChild(audioItem(item)); break;
          case ITEM_KIND.letter: block.appendChild(letterItem(item, "Letter")); break;
          case ITEM_KIND.textNote: block.appendChild(letterItem(item, "Note")); break;
          default: block.appendChild(genericItem(item)); break;
        }
      }
    }

    function photoItem(item) {
      const figure = el("figure", "item-figure");
      const frame = el("div", "item-media-frame");
      figure.appendChild(frame);
      itemPhotoUrl(item).then((url) => {
        if (!url) { frame.replaceWith(unavailableCard("This photo isn’t available.")); return; }
        const img = document.createElement("img");
        img.alt = itemDisplayTitle(item);
        img.loading = "lazy";
        img.src = url;
        frame.appendChild(img);
      });
      appendMeta(figure, item);
      return figure;
    }

    function videoItem(item) {
      const figure = el("figure", "item-figure");
      if (!item.videoStoragePath) {
        // Legacy device-local era (videoFileName only) — bytes never reached
        // the server; a broken player would be undignified.
        figure.appendChild(unavailableCard("This video isn’t available on the web.", "It lives in the capsule on iOS."));
        appendMeta(figure, item);
        return figure;
      }
      const frame = el("div", "item-media-frame");
      figure.appendChild(frame);
      ArkiveStorageHelpers.signedVideoUrl(item.videoStoragePath).then((url) => {
        if (!url) { frame.replaceWith(unavailableCard("This video isn’t available right now.")); return; }
        const video = document.createElement("video");
        video.controls = true;
        video.playsInline = true;
        video.preload = "metadata";
        // #t=0.001 makes the browser surface frame zero as the poster —
        // the ratified frame-grab fallback (no item-level thumbnails exist).
        video.src = `${url}#t=0.001`;
        // Stall watchdog: streaming is primary, but if no metadata arrives
        // in time, self-heal via authenticated download → blob URL
        // (bucket caps keep item videos ≤100MB today).
        const fallback = setTimeout(async () => {
          const blobUrl = await ArkiveStorageHelpers.download(BUCKET.videos, item.videoStoragePath);
          if (blobUrl) {
            video.src = `${blobUrl}#t=0.001`;
          } else {
            frame.replaceWith(unavailableCard("This video isn’t available right now."));
          }
        }, 5000);
        video.addEventListener("loadedmetadata", () => clearTimeout(fallback), { once: true });
        frame.appendChild(video);
      });
      appendMeta(figure, item);
      return figure;
    }

    function audioItem(item) {
      const card = el("div", "card plain-card audio-card");
      card.appendChild(el("span", "micro-label", "Voice"));
      const title = itemDisplayTitle(item);
      if (title) card.appendChild(el("p", "item-caption-line", title));
      const audio = document.createElement("audio");
      audio.controls = true;
      audio.preload = "metadata";
      card.appendChild(audio);
      ArkiveStorageHelpers.download(BUCKET.audio, item.audioStoragePath).then((url) => {
        if (!url) { card.replaceWith(unavailableCard("This recording isn’t available right now.")); return; }
        audio.src = url;
      });
      appendCaptionAndDate(card, item);
      return card;
    }

    function letterItem(item, label) {
      const card = el("div", "letter-card");
      card.appendChild(el("span", "micro-label", label));
      if (item.title) card.appendChild(el("h2", "letter-title", item.title));
      // verbatim — no trimming/normalizing (sharp edge #7)
      card.appendChild(el("div", "letter-body", item.subtitle));
      appendCaptionAndDate(card, item);
      return card;
    }

    function genericItem(item) {
      const card = el("div", "card plain-card");
      if (item.kind) card.appendChild(el("span", "micro-label", item.kind));
      const title = itemDisplayTitle(item);
      if (title) card.appendChild(el("p", "item-caption-line", title));
      if (item.subtitle) card.appendChild(el("p", "item-side-thought", item.subtitle));
      return card;
    }

    function unavailableCard(message, hint) {
      const card = el("div", "card placeholder-card");
      card.appendChild(el("p", "empty-title", message));
      if (hint) card.appendChild(el("p", "empty-hint", hint));
      return card;
    }

    function appendMeta(node, item) {
      const title = itemDisplayTitle(item);
      if (title) node.appendChild(el("p", "item-caption-line", title));
      appendCaptionAndDate(node, item);
    }

    function appendCaptionAndDate(node, item) {
      if (item.caption) node.appendChild(el("p", "item-side-thought", item.caption));
      if (item.momentDate) node.appendChild(el("p", "item-date", fmtMedium(item.momentDate)));
    }

    async function loadContributors(row) {
      if (!row.is_collaborative && !(row.contributor_count > 0)) return;
      try {
        const { data, error } = await supabase
          .from("capsule_contributors").select("*")
          .eq("capsule_id", row.id)
          .in("status", [CONTRIBUTOR_STATUS.invited, CONTRIBUTOR_STATUS.accepted]);
        if (error) throw error;
        if (!data || data.length === 0) return;
        document.getElementById("contributors").hidden = false;
        const rows = document.getElementById("contributor-rows");
        for (const c of data) {
          const rowEl = el("div", "contributor-row");
          rowEl.appendChild(el("span", null, c.display_name || c.invited_email || ""));
          rowEl.appendChild(el("span", "contributor-status", c.status ?? ""));
          rows.appendChild(rowEl);
        }
      } catch (err) {
        console.warn("arkive: contributors load failed (non-fatal)", err);
      }
    }

    function el(tag, className, text) {
      const node = document.createElement(tag);
      if (className) node.className = className;
      if (text != null) node.textContent = text;
      return node;
    }
  </script>
</body>
</html>
