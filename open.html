<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Arkive — A capsule for you</title>
  <link rel="stylesheet" href="./assets/tokens.css">
  <style>
    .ceremony-stub {
      min-height: 70vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 48px 24px;
    }
    .ceremony-stub h1 { margin-top: 16px; }
    .ceremony-stub .empty-hint { max-width: 440px; margin-top: 12px; line-height: 1.6; }
    .ceremony-stub .actions { margin-top: 30px; }
  </style>
</head>
<body hidden>
  <header class="shell-header">
    <a class="wordmark" href="./capsules.html">Arkive</a>
    <nav class="shell-nav" aria-label="Primary">
      <a href="./capsules.html">Capsules</a>
      <a href="./people.html">People</a>
      <a href="./settings.html">Settings</a>
    </nav>
    <div class="shell-account">
      <span data-account-name></span>
      <button class="btn btn-quiet" data-sign-out type="button">Sign Out</button>
    </div>
  </header>

  <main class="ceremony-stub">
    <span class="micro-label">Received capsule</span>
    <h1>This capsule is waiting for you.</h1>
    <p class="empty-hint">
      The opening ceremony arrives on the web in the next build.
      For now, open it in the Arkive app — it’s worth the moment.
    </p>
    <p class="actions"><a class="btn btn-quiet" href="./capsules.html">Back to Capsules</a></p>
  </main>

  <script type="module">
    import { bootSession, wireShell } from "./assets/arkive.js";
    wireShell(await bootSession());
  </script>
</body>
</html>
